components:
  schemas:
    ApiMeta:
      type: object
      required:
        - request_id
        - timestamp
      properties:
        request_id:
          type: string
          example: req_20260614_120000_123456
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          example: v1
    ApiErrorDetail:
      type: object
      properties:
        field:
          type: string
        detail:
          type: string
    ApiResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
        - meta
      properties:
        success:
          type: boolean
        code:
          type: string
          example: OK
        message:
          type: string
          example: ok
        data: {}
        meta:
          $ref: "#/components/schemas/ApiMeta"
        error:
          $ref: "#/components/schemas/ApiErrorDetail"
    IndicatorDefinitionInput:
      type: object
      required:
        - indicator_code
        - name
      properties:
        indicator_code:
          type: string
          example: MACD
        name:
          type: string
          example: 指数平滑异同移动平均线
        category:
          type: string
          example: trend
        description:
          type: string
        params_schema:
          type: string
          example: '{"fast":12,"slow":26,"signal":9}'
        output_fields:
          type: string
          example: '["dif","dea","macd"]'
        enabled:
          type: boolean
          default: true
    PatternDefinitionInput:
      type: object
      required:
        - pattern_code
        - name
        - talib_function
      properties:
        pattern_code:
          type: string
          example: engulfing_pattern
        name:
          type: string
          example: 吞噬模式
        category:
          type: string
          example: candlestick
        talib_function:
          type: string
          example: CDLENGULFING
        direction:
          type: string
          enum:
            - bullish
            - bearish
            - both
            - neutral
          default: both
        description:
          type: string
        params_schema:
          type: string
          example: '{}'
        enabled:
          type: boolean
          default: true
    ScreeningTemplateInput:
      type: object
      required:
        - name
        - conditions
      properties:
        template_id:
          type: string
          example: screen_tpl_macd_engulfing
        name:
          type: string
          example: MACD红柱且吞噬形态
        description:
          type: string
          example: MACD macd > 0 且最近出现看涨吞噬形态
        conditions:
          type: object
          additionalProperties: true
          example:
            logic: and
            indicator_conditions:
              - period: 1d
                indicator_code: MACD
                field: macd
                op: gt
                threshold: 0
            pattern_conditions:
              - period: 1d
                pattern_code: engulfing_pattern
                direction: bullish
        enabled:
          type: boolean
          default: true
        created_by:
          type: string
          example: system
    StrategyTemplateInput:
      type: object
      required:
        - name
      properties:
        strategy_id:
          type: string
          example: strategy_tpl_macd_engulfing
        name:
          type: string
          example: MACD 吞噬回测策略
        description:
          type: string
          example: 使用 MACD 红柱和看涨吞噬形态选股，并执行 20 日持有回测
        screening_template_id:
          type: string
          example: screen_tpl_macd_engulfing
        conditions:
          type: object
          additionalProperties: true
        backtest_params:
          type: object
          additionalProperties: true
          example:
            period: 1d
            hold_bars: 20
            lookback: 260
            benchmark_symbol: "000300"
        risk_params:
          type: object
          additionalProperties: true
          example:
            fee_rate: 0.00025
            slippage_rate: 0.0005
            stop_loss: 0.08
            take_profit: 0.15
        enabled:
          type: boolean
          default: true
        created_by:
          type: string
          example: system
